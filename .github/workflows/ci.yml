name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        shell: bash
        run: moon test --target native

  verify:
    name: Verify Generated Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify formatting and generated files
        shell: bash
        run: |
          moon fmt --check
          moon check --deny-warn --target native
          moon info --target native
          git diff --exit-code

      - name: Build
        shell: bash
        run: moon build --target native

      - name: Coverage XML
        shell: bash
        run: |
          moon test --target native --enable-coverage
          moon coverage analyze -p justjavac/num_cpus -- -f cobertura -o coverage.xml

      - name: Require 100% coverage
        shell: bash
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          rate = float(root.attrib["line-rate"])
          if rate < 1.0:
              raise SystemExit(f"Expected 100% line coverage, got {rate:.2%}")
          print(f"Coverage: {rate:.2%}")
          PY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true
